services:
  stapi:
    image: ghcr.io/substratusai/stapi:v2.2.2-3
    ports:
      - "8080:8080"

  indexer:
    build:
      context: .
      dockerfile: crates/lexonarchivebuilder-indexer/Dockerfile
    depends_on:
      - stapi
    working_dir: /workspace
    volumes:
      - .:/workspace
      - lexonarchivebuilder-block-store:/workspace/examples/local/block-store
    command:
      [
        "run",
        "--request",
        "/workspace/examples/local/request.sample.json",
        "--summary-out",
        "/workspace/examples/local/output/summary.json"
      ]

  scale-test:
    build:
      context: .
      dockerfile: crates/lexonarchivebuilder-indexer/Dockerfile.scale-test
    depends_on:
      - stapi
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      SCALE_TEST_INDEXER_MODE: direct
      SCALE_TEST_WAIT_HOST: stapi
      SCALE_TEST_WAIT_PORT: "8080"
      SCALE_TEST_WAIT_TIMEOUT_SECS: "60"
      SCALE_TEST_EMBEDDING_BASE_URL: http://stapi:8080
    command:
      [
        "--sources-file",
        "/workspace/examples/local/scale-test/rsync.sources.sample.txt"
      ]

  mcp:
    build:
      context: .
      dockerfile: crates/lexonarchivebuilder-mcp/Dockerfile
    depends_on:
      - stapi
    working_dir: /workspace
    volumes:
      - .:/workspace
      - lexonarchivebuilder-block-store:/workspace/examples/local/block-store
    stdin_open: true
    command:
      [
        "serve",
        "--config",
        "/workspace/examples/local/mcp.request.sample.json"
      ]

volumes:
  lexonarchivebuilder-block-store:
